# fly.toml app configuration file generated for spinwin-staging on 2026-04-08T00:15:38-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'spinwin-staging'
primary_region = 'sjc'

[build]

[env]
  BIND_ADDR = '0.0.0.0:8080'
  DATABASE_URL = 'sqlite:/data/spinwin.db?mode=rwc'

[[mounts]]
  source = 'spinwin_staging_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
