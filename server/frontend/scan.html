<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Scanner — Spin & Win</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="/scan.css">
</head>
<body>
    <h1>Staff Scanner</h1>

    <div id="scanner-container">
        <video id="scanner-video" autoplay playsinline></video>
        <div class="scan-overlay" id="scan-overlay"></div>
    </div>

    <p id="status-line">Point camera at a ticket QR code</p>

    <div id="result-panel">
        <div class="result-status" id="result-status"></div>
        <div id="result-details"></div>
        <button class="redeem-btn" id="redeem-btn" style="display:none;">Mark as Redeemed</button>
        <button class="scan-again-btn" id="scan-again-btn">Scan Another</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script type="module" src="/scan.js"></script>
</body>
</html>
