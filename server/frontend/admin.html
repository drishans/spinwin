<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Spin & Win</title>
    <link rel="stylesheet" href="/admin.css">
</head>
<body>
    <h1>Spin & Win — Admin Dashboard <button class="refresh-btn" onclick="loadAll()">Refresh</button></h1>

    <div class="stats-bar" id="stats-bar"></div>

    <h2>Prize Inventory</h2>
    <table>
        <thead>
            <tr><th>Prize</th><th>Stock</th><th>Claimed</th><th>Adjust</th></tr>
        </thead>
        <tbody id="prize-table"></tbody>
    </table>

    <h2>Recent Tickets (last 100)</h2>
    <table>
        <thead>
            <tr><th>Name</th><th>Email</th><th>Prize</th><th>Redeemed</th><th>Time</th></tr>
        </thead>
        <tbody id="ticket-table"></tbody>
    </table>

    <script src="/admin.js"></script>
</body>
</html>
