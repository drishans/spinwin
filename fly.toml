app = 'spinwin'
primary_region = 'sjc'

[build]

[env]
  DATABASE_URL = "sqlite:/data/spinwin.db?mode=rwc"
  BIND_ADDR = "0.0.0.0:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[mounts]
  source = "spinwin_data"
  destination = "/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
